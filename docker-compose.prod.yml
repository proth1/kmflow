version: "3.9"

# Production overrides for KMFlow.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge

services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    ports: []  # No host port exposure in production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - data-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  neo4j:
    environment:
      NEO4J_AUTH: ${NEO4J_USER:?Set NEO4J_USER}/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD}
    ports: []  # No host port exposure in production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - data-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    command: redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports: []  # No host port exposure in production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - data-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    environment:
      APP_ENV: production
      DEBUG: "false"
      AUTH_DEV_MODE: "false"
      LOG_LEVEL: WARNING
      COOKIE_SECURE: "true"
      ENABLE_HSTS: "true"
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?ssl=require"
      NEO4J_URI: "bolt+s://neo4j:7687"
      REDIS_URL: "rediss://:${REDIS_PASSWORD}@redis:6379/0"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend-net
      - data-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes: []  # No bind mounts in production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "10"

  frontend:
    environment:
      NODE_ENV: production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - frontend-net
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    volumes: []  # No bind mounts in production
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  cib7:
    environment:
      CAMUNDA_USER: ${CAMUNDA_USER:?Set CAMUNDA_USER}
      CAMUNDA_PASSWORD: ${CAMUNDA_PASSWORD:?Set CAMUNDA_PASSWORD}
    ports: []  # No host port exposure in production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - backend-net

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD}
    ports: []  # No host port exposure in production
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - data-net

  mailpit:
    ports: []  # No host port exposure in production
    profiles:
      - never  # Never start mailpit in production

# Financial Regulatory Domain Seed List
# Used by the KMFlow semantic engine to bootstrap entity extraction and
# concept recognition in SEC/FINRA/FCA/MAS/HKMA/ESMA regulatory documents.
#
# Structure:
#   Each top-level key is a domain concept category.
#   Each entry is a canonical term with optional aliases.
#
# Jurisdictions covered: US (SEC, FINRA), UK (FCA), Singapore (MAS),
#                        Hong Kong (HKMA), EU (ESMA)

version: "1.0"
domain: "financial_regulations"


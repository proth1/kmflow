# Wealth Management Domain Seed List
# ====================================
# Domain vocabulary for custody, clearing, and wealth advisory engagements.
# Organized by TermCategory (activity, system, role, regulation, artifact).
#
# Each term has:
#   term               - canonical display name
#   category           - TermCategory enum value
#   description        - one-sentence definition
#   aliases            - common alternate names / abbreviations
#   related_regulations - applicable regulatory frameworks
#
# Source: Apex Clearing / Apex Advisor Solutions domain, U.S. and international
# regulatory context, buy-side and sell-side wealth operations.

domain: wealth_management

terms:

  # ── Activities ─────────────────────────────────────────────────────────────

  - term: trade execution
    category: activity
    description: >
      The act of placing and filling a buy or sell order in a financial instrument
      on a trading venue or via a dealer.
    aliases:
      - order fill
      - trade fill
      - execution
    related_regulations:
      - Reg BI
      - MiFID II
      - SEC Rule 15c6-1

  - term: order routing
    category: activity
    description: >
      The process of directing a client order to the appropriate venue, market
      maker, or internalization pool for execution.
    aliases:
      - smart order routing
      - SOR
      - order flow management
    related_regulations:
      - Reg NMS
      - Reg BI
      - MiFID II

  - term: portfolio rebalancing
    category: activity
    description: >
      Adjusting a portfolio's asset weights back to target allocations by
      buying and selling securities to correct drift.
    aliases:
      - rebalancing
      - drift correction
      - allocation rebalance
    related_regulations:
      - Investment Advisers Act
      - Reg BI

  - term: NAV calculation
    category: activity
    description: >
      Computing the net asset value of a fund by summing asset market values,
      subtracting liabilities, and dividing by shares outstanding.
    aliases:
      - net asset value calculation
      - fund pricing
      - daily NAV
    related_regulations:
      - Investment Company Act
      - SEC Rule 17a-5

  - term: corporate actions processing
    category: activity
    description: >
      Handling mandatory and voluntary corporate events such as dividends,
      stock splits, mergers, tender offers, and rights offerings on behalf
      of beneficial owners.
    aliases:
      - corporate action handling
      - CA processing
      - events processing
    related_regulations:
      - SEC Rule 17a-5
      - DTC rules

  - term: custody settlement
    category: activity
    description: >
      The process of finalizing the transfer of securities and cash between
      counterparties through a central securities depository or custodian.
    aliases:
      - settlement
      - securities settlement
      - DVP settlement
    related_regulations:
      - SEC Rule 15c6-1
      - SEC Rule 15c3-3

  - term: clearing validation
    category: activity
    description: >
      Comparing and matching trade details between counterparties at a clearing
      house to confirm, net, and guarantee settlement obligations.
    aliases:
      - trade clearing
      - clearing and settlement
      - trade validation
    related_regulations:
      - Dodd-Frank
      - SEC Rule 17a-5
      - FINRA Rule 4210

  - term: reconciliation
    category: activity
    description: >
      Comparing internal records of positions, cash, and transactions against
      custodian, counterparty, or exchange records to identify and resolve breaks.
    aliases:
      - position reconciliation
      - cash reconciliation
      - break resolution
    related_regulations:
      - SEC Rule 17a-5
      - SEC Rule 15c3-3

  - term: KYC onboarding
    category: activity
    description: >
      Know Your Customer due diligence performed at account opening to verify
      client identity, assess risk, and establish the regulatory customer profile.
    aliases:
      - know your customer
      - KYC
      - client onboarding
      - account opening due diligence
    related_regulations:
      - Bank Secrecy Act
      - USA PATRIOT Act
      - FinCEN CDD Rule

  - term: AML screening
    category: activity
    description: >
      Anti-Money Laundering checks that screen clients, transactions, and
      counterparties against watchlists, sanctions lists, and behavior models.
    aliases:
      - anti-money laundering screening
      - AML
      - sanctions screening
      - OFAC screening
    related_regulations:
      - Bank Secrecy Act
      - USA PATRIOT Act
      - Dodd-Frank

  - term: beneficial ownership verification
    category: activity
    description: >
      Identifying and verifying the natural persons who ultimately own or
      control a legal entity opening a financial account.
    aliases:
      - UBO verification
      - ultimate beneficial owner check
      - BO verification
    related_regulations:
      - FinCEN CDD Rule
      - Bank Secrecy Act
      - USA PATRIOT Act

  - term: proxy voting
    category: activity
    description: >
      Casting votes on shareholder resolutions on behalf of beneficial owners
      of securities held in custody.
    aliases:
      - shareholder voting
      - vote execution
      - proxy processing
    related_regulations:
      - Investment Advisers Act
      - SEC Rule 14a

  - term: securities lending
    category: activity
    description: >
      Temporarily transferring securities to a borrower (typically to cover
      short positions) in exchange for collateral and a lending fee.
    aliases:
      - stock lending
      - sec lending
      - SBL
    related_regulations:
      - SEC Rule 15c3-3
      - FINRA Rule 4210

  - term: margin management
    category: activity
    description: >
      Monitoring margin accounts, calculating requirements, and issuing or
      responding to margin calls to maintain regulatory and house capital ratios.
    aliases:
      - margin monitoring
      - margin call management
      - reg T margin
    related_regulations:
      - FINRA Rule 4210
      - Regulation T
      - SEC Rule 15c3-3

  - term: dividend processing
    category: activity
    description: >
      Collecting dividends from issuers and distributing cash or stock dividends
      to beneficial owners on record date.
    aliases:
      - income processing
      - dividend distribution
      - cash dividend processing
    related_regulations:
      - SEC Rule 17a-5
      - DTC rules

  - term: tax lot accounting
    category: activity
    description: >
      Tracking the acquisition date and cost basis of each lot of securities
      purchased to support accurate gain/loss and tax reporting.
    aliases:
      - lot accounting
      - cost basis accounting
      - FIFO/LIFO accounting
    related_regulations:
      - IRS cost basis reporting rules
      - SEC Rule 17a-5

  - term: trade allocation
    category: activity
    description: >
      Distributing the fills of a block or aggregated order across multiple
      client accounts after execution.
    aliases:
      - order allocation
      - block allocation
      - post-trade allocation
    related_regulations:
      - Investment Advisers Act
      - Reg BI
      - MiFID II

  - term: best execution
    category: activity
    description: >
      The obligation to execute client orders on terms most favorable to the
      client, considering price, costs, speed, likelihood of execution, and size.
    aliases:
      - best ex
      - execution quality
      - MiFID best execution
    related_regulations:
      - Reg BI
      - MiFID II
      - FINRA Rule 5310

  - term: suitability assessment
    category: activity
    description: >
      Evaluating whether a recommended investment product or strategy is
      appropriate given the client's financial situation, risk tolerance,
      investment horizon, and objectives.
    aliases:
      - suitability review
      - client suitability
      - know your customer suitability
    related_regulations:
      - Reg BI
      - Investment Advisers Act
      - FINRA Rule 2111

  - term: fee billing
    category: activity
    description: >
      Calculating and collecting advisory, custody, and transactional fees
      from client accounts based on AUM, flat fees, or commission schedules.
    aliases:
      - fee calculation
      - advisory fee billing
      - AUM billing
    related_regulations:
      - Investment Advisers Act
      - Reg BI


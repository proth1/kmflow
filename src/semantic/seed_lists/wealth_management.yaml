      risk oversight, and consumer protection.
    aliases:
      - Dodd-Frank Act
      - DFA
      - Dodd-Frank Wall Street Reform Act
    related_regulations:
      - SEC Rule 15c3-3
      - Bank Secrecy Act

  - term: MiFID II
    category: regulation
    description: >
      Markets in Financial Instruments Directive II — EU regulation governing

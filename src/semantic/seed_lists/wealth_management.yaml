  # ── Regulations ────────────────────────────────────────────────────────────

  - term: SEC Rule 15c3-3
    category: regulation
    description: >
      Customer Protection Rule — requires broker-dealers to maintain physical
      possession or control of customer securities and segregate customer cash.
    aliases:
      - Rule 15c3-3
      - customer protection rule
      - customer reserve requirements
    related_regulations:
      - SEC Rule 17a-5

  - term: SEC Rule 17a-5
    category: regulation
    description: >
      Reports to be Made by Certain Brokers and Dealers — requires periodic
      financial and operational reporting including audited financial statements.
    aliases:
      - Rule 17a-5
      - broker-dealer reporting rule
      - FOCUS report rule
    related_regulations:
      - SEC Rule 15c3-3

  - term: SEC Rule 15c6-1
    category: regulation
    description: >
      Settlement Cycle Rule — mandates that broker-dealer transactions in most
      securities settle no later than T+1 (one business day after trade date).
    aliases:
      - Rule 15c6-1
      - T+1 settlement rule
      - settlement cycle rule
    related_regulations:
      - SEC Rule 17a-5

  - term: Reg BI
    category: regulation
    description: >
      Regulation Best Interest — requires broker-dealers to act in the best
      interest of retail customers when making investment recommendations.
    aliases:
      - Regulation Best Interest
      - best interest standard
      - Reg BI rule
    related_regulations:
      - Investment Advisers Act
      - SEC Rule 17a-5

  - term: FINRA Rule 4210
    category: regulation
    description: >
      FINRA's margin requirements rule governing the amount of credit that
      broker-dealers may extend to customers for securities purchases.
    aliases:
      - Rule 4210
      - FINRA margin rule
      - margin requirements
    related_regulations:
      - Regulation T
      - SEC Rule 15c3-3

  - term: Investment Advisers Act
    category: regulation
    description: >
      Federal law (1940) governing the registration, conduct, and fiduciary
      obligations of investment advisers managing client assets for compensation.
    aliases:
      - Advisers Act
      - IAA
      - Investment Advisers Act of 1940
    related_regulations:
      - Reg BI
      - SEC Form ADV

  - term: Investment Company Act
    category: regulation
    description: >
      Federal law (1940) regulating the organization and activities of
      investment companies including mutual funds, ETFs, and closed-end funds.
    aliases:
      - ICA
      - 40 Act
      - Investment Company Act of 1940
    related_regulations:
      - Investment Advisers Act
      - SEC Rule 17a-5

  - term: Bank Secrecy Act
    category: regulation
    description: >
      U.S. federal law requiring financial institutions to assist government
      agencies in detecting and preventing money laundering and financial crime.
    aliases:
      - BSA
      - Bank Secrecy Act of 1970
      - FinCEN BSA
    related_regulations:
      - USA PATRIOT Act
      - Dodd-Frank

  - term: USA PATRIOT Act
    category: regulation
    description: >
      Post-9/11 law that expanded AML requirements for financial institutions,
      mandating enhanced customer due diligence and suspicious activity monitoring.
    aliases:
      - PATRIOT Act
      - Uniting and Strengthening America by Providing Appropriate Tools Act
    related_regulations:
      - Bank Secrecy Act
      - FinCEN CDD Rule

  - term: Dodd-Frank
    category: regulation
    description: >
      Dodd-Frank Wall Street Reform and Consumer Protection Act (2010) — sweeping

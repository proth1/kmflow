# Decision Logic Domain Seed List
# ================================
# Domain vocabulary for decision intelligence, DMN decision tables,
# business rules, and decision management.
#
# Each term has:
#   term               - canonical display name
#   category           - TermCategory enum value
#   description        - one-sentence definition
#   aliases            - common alternate names / abbreviations
#
# Source: OMG DMN 1.3 specification, business rules management,
# decision management best practices.

domain: decision_logic

terms:

  # ── Decision Table Concepts ──────────────────────────────────────────────

  - term: decision table
    category: artifact
    description: >
      A tabular representation of decision logic with input columns,
      output columns, and rules that map input conditions to outputs.
    aliases:
      - DT
      - decision matrix
      - rules table

  - term: hit policy
    category: activity
    description: >
      The policy that determines how many rules in a decision table can fire
      and how their outputs are aggregated (UNIQUE, FIRST, PRIORITY, etc.).
    aliases:
      - hit policy indicator
      - rule aggregation policy

  - term: input clause
    category: artifact
    description: >
      A column in a decision table that defines an input variable and its
      allowed values or expression for rule evaluation.
    aliases:
      - input column
      - input expression
      - decision input

  - term: output clause
    category: artifact
    description: >
      A column in a decision table that defines the result value produced
      when a rule matches the input conditions.
    aliases:
      - output column
      - output expression
      - decision output

  - term: decision rule
    category: artifact
    description: >
      A single row in a decision table that maps specific input entry
      conditions to corresponding output entry values.
    aliases:
      - business rule
      - rule row
      - table rule

  # ── Decision Management ──────────────────────────────────────────────────

  - term: threshold
    category: activity
    description: >
      A numeric boundary value used in business rules to trigger different
      decision outcomes (e.g., credit score >= 680).
    aliases:
      - cutoff
      - limit
      - boundary value
      - trigger point

  - term: exception rule
    category: activity
    description: >
      A rule that handles cases falling outside normal processing parameters,
      typically requiring elevated approval authority.
    aliases:
      - exception handling
      - override rule
      - deviation rule
      - waiver

  - term: override authority
    category: role
    description: >
      The person or role with delegated authority to approve exceptions
      to standard business rules.
    aliases:
      - exception approver
      - override approver
      - escalation authority

  - term: compensating factor
    category: artifact
    description: >
      A strength in one area that offsets a weakness in another,
      used to justify exceptions to standard rules.
    aliases:
      - compensating control
      - mitigating factor
      - offsetting strength

  - term: authority level
    category: role
    description: >
      The hierarchical level of approval authority required for different
      types of decisions or exceptions.
    aliases:
      - approval authority
      - signoff level
      - delegation of authority

  # ── Rule Governance ──────────────────────────────────────────────────────

  - term: rule effective date
    category: artifact
    description: >
      The date from which a business rule becomes active and enforceable
      in decision processing.
    aliases:
      - effective from
      - rule start date
      - activation date

  - term: rule expiration date
    category: artifact
    description: >
      The date after which a business rule is no longer active
      and should not be applied in decision processing.
    aliases:
      - effective to
      - rule end date
      - sunset date

  - term: rule conflict
    category: activity
    description: >
      A situation where two or more business rules produce contradictory
      outcomes for the same input conditions.
    aliases:
      - rule contradiction
      - policy conflict
      - threshold disagreement

  - term: rule precedence
    category: activity
    description: >
      The ordering or priority that determines which rule takes effect
      when multiple rules could apply to the same situation.
    aliases:
      - rule priority
      - rule hierarchy
      - conflict resolution order

  # ── FEEL Expression Language ─────────────────────────────────────────────

  - term: FEEL expression
    category: artifact
    description: >
      Friendly Enough Expression Language - the standard expression
      language defined by OMG for use in DMN decision models.
    aliases:
      - FEEL
      - DMN expression
      - decision expression

  - term: decision requirement
    category: artifact
    description: >
      A dependency between decisions in a decision requirements diagram,
      showing that one decision requires the output of another.
    aliases:
      - decision dependency
      - DRD link
      - information requirement

  - term: decision requirements diagram
    category: artifact
    description: >
      A visual representation of decisions, their interrelationships,
      and the business knowledge and input data they require.
    aliases:
      - DRD
      - decision model diagram
      - decision network

  # ── Decision Patterns ────────────────────────────────────────────────────

  - term: eligibility determination
    category: activity
    description: >
      A decision that evaluates whether a subject meets the criteria
      to qualify for a product, service, or process.
    aliases:
      - eligibility check
      - qualification assessment
      - suitability determination

  - term: risk classification
    category: activity
    description: >
      A decision that assigns a risk category or score based on
      evaluation of multiple risk factors.
    aliases:
      - risk scoring
      - risk rating
      - risk assessment
      - risk categorization

  - term: approval routing
    category: activity
    description: >
      A decision that determines the appropriate approval path based
      on transaction characteristics and authority levels.
    aliases:
      - approval workflow
      - routing decision
      - escalation routing

  - term: pricing determination
    category: activity
    description: >
      A decision that calculates the price, rate, or fee based on
      product parameters and customer characteristics.
    aliases:
      - rate determination
      - pricing calculation
      - fee schedule lookup

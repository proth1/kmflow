# Golden evaluation queries — gap_analysis query type
# These are engagement-agnostic templates. In practice, expected_source_ids
# will be populated per engagement with actual evidence_item UUIDs.

queries:
  - query: "What are the most significant gaps between the current state and the target operating model?"
    expected_answer: >
      The most significant gaps are identified by aligning the current-state process
      map (derived from evidence) against the target operating model (TOM) reference
      framework. Gaps are ranked by materiality score, which combines severity of
      deviation, number of evidence sources corroborating the gap, and strategic
      importance of the affected capability. Typical high-materiality gaps include
      missing automation in high-volume manual steps, absent governance controls,
      and capability areas with no current-state evidence at all.
    query_type: gap_analysis
    difficulty: easy
    tags: ["tom", "current-state", "gaps"]
    expected_source_ids: []
    source: manual

  - query: "Which capability areas show the lowest maturity score?"
    expected_answer: >
      Maturity scores are computed per capability area on a 1-5 scale using the
      TOM maturity framework. Scores are derived from evidence signals: process
      documentation quality, automation coverage, governance artefacts, and
      performance measurement. Capability areas with maturity scores at Level 1
      (ad hoc) or Level 2 (repeatable but informal) are prioritised for remediation.
      Areas with no supporting evidence default to Level 1 with a low-confidence flag.
    query_type: gap_analysis
    difficulty: easy
    tags: ["maturity", "capability", "scoring"]
    expected_source_ids: []
    source: manual

  - query: "What remediation actions are recommended to close the identified gaps?"
    expected_answer: >
      Remediation actions are generated by mapping each gap to a TOM capability
      requirement and selecting the appropriate intervention type: process
      redesign, automation, system integration, policy update, or training.
      Each action is assigned a priority (critical, high, medium, low), an
      estimated effort level, and a dependency chain where one action must
      precede another. The action roadmap is sequenced to maximise quick wins
      while laying the foundation for longer-term structural changes.
    query_type: gap_analysis
    difficulty: easy
    tags: ["remediation", "actions", "roadmap"]
    expected_source_ids: []
    source: manual

  - query: "How does the current process maturity compare to industry benchmarks?"
    expected_answer: >
      Benchmark comparison is performed by mapping the engagement's maturity scores
      against the TOM reference model's benchmark bands for the relevant industry
      and function. Scores significantly below the benchmark median flag priority
      remediation areas. Where the current state exceeds the benchmark, this is
      highlighted as a strength. Industry benchmarks are sourced from the TOM
      reference library and updated periodically.
    query_type: gap_analysis
    difficulty: medium
    tags: ["benchmark", "industry", "maturity"]
    expected_source_ids: []
    source: manual

  - query: "Which gaps are systemic (affecting multiple process areas) versus localised?"
    expected_answer: >
      Systemic gaps appear as shared failure patterns across multiple capability
      nodes in the knowledge graph. They are identified by clustering gap instances
      that share a common root cause entity (e.g., a specific system limitation,
      a policy absence, or a skill deficit). Localised gaps affect a single process
      step or capability area and are addressed through targeted interventions.
      Systemic gaps require cross-functional remediation programmes and are
      escalated to the strategic roadmap.
    query_type: gap_analysis
    difficulty: medium
    tags: ["systemic", "localised", "root-cause"]
    expected_source_ids: []
    source: manual

  - query: "What is the estimated business impact of closing the top three capability gaps?"
    expected_answer: >
      Business impact is estimated by combining the TOM materiality score with
      engagement-specific context provided in the evidence. For each gap, impact
      is expressed across three dimensions: operational efficiency (cycle time
      reduction, error rate improvement), risk reduction (compliance exposure,
      operational risk), and cost avoidance or revenue enablement. Where quantitative
      data is present in the evidence, impact estimates use that data; otherwise
      ranges are derived from the TOM benchmark library.
    query_type: gap_analysis
    difficulty: medium
    tags: ["business-impact", "prioritisation", "value"]
    expected_source_ids: []
    source: manual

  - query: "Are there any compliance or regulatory gaps identified in the evidence?"
    expected_answer: >
      Compliance gaps are identified by mapping current-state process controls
      against the regulatory requirements referenced in the evidence or loaded
      from the regulatory seed list. A gap is raised when a required control
      (e.g., four-eyes approval, audit trail, data retention policy) is absent
      from the current-state documentation or explicitly noted as missing in
      interview transcripts. Regulatory gaps are always classified as critical
      priority regardless of their maturity score.
    query_type: gap_analysis
    difficulty: medium
    tags: ["compliance", "regulatory", "controls"]
    expected_source_ids: []
    source: manual

  - query: >
      What is the sequence in which gaps should be addressed to maximise ROI
      while managing implementation risk?
    expected_answer: >
      Sequencing is determined by a multi-factor scoring model: (1) dependency
      ordering — foundational capabilities must be in place before dependent
      ones; (2) effort-to-impact ratio — quick wins with high impact and low
      effort are prioritised in the first wave; (3) risk adjacency — gaps
      adjacent to compliance or critical-path processes are accelerated.
      The output is a phased roadmap (typically three to five waves) with
      explicit entry and exit criteria for each phase.
    query_type: gap_analysis
    difficulty: hard
    tags: ["sequencing", "roadmap", "roi"]
    expected_source_ids: []
    source: manual

  - query: >
      Which gaps cannot be closed without significant technology investment, and
      what are the alternatives if that investment is not available?
    expected_answer: >
      Technology-dependent gaps are flagged when the recommended remediation
      requires a system replacement, new integration, or platform capability
      not present in the current landscape. For each such gap, the analysis
      provides an alternative pathway — typically a compensating control or
      interim manual process — that partially closes the gap at lower cost.
      The alternative pathway's residual risk and performance trade-offs are
      documented alongside the full-investment option to support prioritisation
      decisions.
    query_type: gap_analysis
    difficulty: hard
    tags: ["technology", "investment", "alternatives"]
    expected_source_ids: []
    source: manual

  - query: >
      How confident is the gap analysis, and which findings are most sensitive
      to evidence quality or completeness?
    expected_answer: >
      Gap analysis confidence is a function of the underlying evidence confidence
      scores. Findings based on high-confidence, triangulated evidence (score > 0.75,
      multiple source types) carry high analytical confidence. Findings derived
      from a single low-quality source carry a confidence caveat and are marked
      as provisional. The most sensitivity-prone findings are those in process
      areas with thin evidence coverage — specifically areas where only one source
      type was submitted. The system surfaces a ranked list of evidence collection
      priorities that would most improve the analytical confidence of provisional
      gap findings.
    query_type: gap_analysis
    difficulty: hard
    tags: ["confidence", "sensitivity", "evidence-quality"]
    expected_source_ids: []
    source: manual

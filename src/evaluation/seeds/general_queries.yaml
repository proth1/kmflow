# Golden evaluation queries — general query type
# These are engagement-agnostic templates. In practice, expected_source_ids
# will be populated per engagement with actual evidence_item UUIDs.

queries:
  - query: "What are the main business processes identified in the evidence?"
    expected_answer: >
      Based on the ingested evidence, the main business processes include the core
      operational workflows documented across the submitted artifacts. The evidence
      typically identifies end-to-end processes spanning intake, processing, review,
      approval, and fulfilment stages, along with supporting processes such as
      exception handling, escalation, and reporting.
    query_type: general
    difficulty: easy
    tags: ["overview", "processes"]
    expected_source_ids: []
    source: manual

  - query: "How many distinct process areas are covered by the ingested evidence?"
    expected_answer: >
      The ingested evidence covers several distinct process areas. The exact count
      varies by engagement, but a typical submission spans between three and eight
      process domains (e.g., operations, compliance, client servicing, technology,
      finance). Each area is identified through a combination of document metadata,
      entity extraction, and semantic clustering.
    query_type: general
    difficulty: easy
    tags: ["overview", "scope"]
    expected_source_ids: []
    source: manual

  - query: "Who are the key stakeholders and roles mentioned across the evidence?"
    expected_answer: >
      The evidence surfaces a range of stakeholders including frontline operators,
      team leads, compliance officers, IT administrators, and executive sponsors.
      Roles are extracted from process documentation, interview transcripts, and
      organisational charts. Stakeholder frequency and co-occurrence patterns
      indicate relative influence within each process area.
    query_type: general
    difficulty: easy
    tags: ["stakeholders", "roles"]
    expected_source_ids: []
    source: manual

  - query: "What types of evidence were submitted for this engagement?"
    expected_answer: >
      Submitted evidence typically includes process maps (BPMN, Visio), policy and
      procedure documents (PDF, Word), interview transcripts, spreadsheet-based
      data exports, system screenshots, and event logs. The evidence pipeline
      classifies each artefact by type and applies the appropriate parser before
      ingestion into the knowledge graph.
    query_type: general
    difficulty: easy
    tags: ["evidence", "ingestion"]
    expected_source_ids: []
    source: manual

  - query: "What is the overall confidence score for the process knowledge graph?"
    expected_answer: >
      The knowledge graph confidence score is a weighted composite of source quality,
      entity extraction confidence, and triangulation coverage. Scores above 0.75
      indicate high-confidence graphs suitable for TOM alignment. Scores between
      0.50 and 0.75 flag areas requiring additional evidence collection. Below 0.50
      triggers an evidence quality alert for the engagement manager.
    query_type: general
    difficulty: medium
    tags: ["confidence", "quality"]
    expected_source_ids: []
    source: manual

  - query: "Which process areas have the least evidence coverage?"
    expected_answer: >
      Coverage gaps are identified by comparing expected process domains against
      the volume and diversity of ingested evidence. Areas with fewer than two
      independent source types, or with low entity-extraction yields, are flagged
      as under-evidenced. Common gaps include back-office exception handling,
      informal workarounds, and cross-functional handoff procedures.
    query_type: general
    difficulty: medium
    tags: ["coverage", "gaps", "evidence"]
    expected_source_ids: []
    source: manual

  - query: "Summarise the key findings from the evidence in three bullet points."
    expected_answer: >
      A three-point summary typically captures: (1) the dominant process patterns
      and their maturity level; (2) the primary pain points or inefficiencies
      surfaced across multiple evidence sources; and (3) the highest-priority
      opportunity areas identified through consensus scoring. The summary is
      generated by the RAG copilot using triangulated evidence with source
      attribution.
    query_type: general
    difficulty: medium
    tags: ["summary", "findings"]
    expected_source_ids: []
    source: manual

  - query: >
      How consistent is the evidence across different source types for the same
      process area?
    expected_answer: >
      Consistency is measured by the consensus algorithm, which triangulates
      claims across independent source types (documents, interviews, system data).
      High consistency (consensus score > 0.8) indicates reliable process
      understanding. Contradictions between sources are surfaced as conflicts in
      the knowledge graph and escalated for human review before TOM alignment
      proceeds.
    query_type: general
    difficulty: hard
    tags: ["consistency", "consensus", "triangulation"]
    expected_source_ids: []
    source: manual

  - query: "What entities are most frequently referenced across all evidence sources?"
    expected_answer: >
      Entity frequency is computed across all ingested documents and weighted by
      source confidence. Typically the highest-frequency entities are core process
      actors (roles, systems, organisational units) and key artefacts (forms,
      reports, approvals). Frequency combined with centrality in the knowledge
      graph identifies the entities most critical to process understanding.
    query_type: general
    difficulty: medium
    tags: ["entities", "knowledge-graph"]
    expected_source_ids: []
    source: manual

  - query: >
      What is the evidence triangulation score for the most uncertain process
      area, and what additional evidence would reduce uncertainty?
    expected_answer: >
      Triangulation scores below 0.5 indicate that a process area is supported
      by fewer than two independent source types or that sources conflict. For
      the most uncertain area, the recommended evidence to collect is determined
      by gap analysis against the expected source matrix: if only policy documents
      exist, the system recommends adding interview transcripts or system-event
      logs to corroborate the documented procedure.
    query_type: general
    difficulty: hard
    tags: ["triangulation", "uncertainty", "evidence-collection"]
    expected_source_ids: []
    source: manual

# Project Management Tool Configuration
# KMFlow Platform - Dual: GitHub Issues (legacy) + Jira (primary)

project_management_tool: "Jira"
repository: "proth1/kmflow"
branch_format: "feature/KMFLOW-{id}-{description}"

jira:
  url: "https://agentic-sdlc.atlassian.net"
  project_key: "KMFLOW"
  board_id: 567
  default_issue_type: "story"

  # Issue types (discovered dynamically)
  issue_types:
    - epic
    - story
    - task
    - bug
    - subtask

  # Statuses
  statuses:
    - "Backlog"
    - "To Do"
    - "In Progress"
    - "In Review"
    - "Done"

  # Labels
  labels:
    types:
      - "type:story"
      - "type:task"
      - "type:bug"
      - "type:epic"
      - "type:spike"
    priorities:
      - "P0-critical"
      - "P1-high"
      - "P2-medium"
      - "P3-low"
    domains:
      - "domain:evidence"
      - "domain:semantic"
      - "domain:consensus"
      - "domain:tom"
      - "domain:api"
      - "domain:frontend"
      - "domain:agent"
      - "domain:infra"
      - "domain:security"
      - "domain:presentation"

github:
  enabled: true
  owner: "proth1"
  repo: "kmflow"

# PR linking
pr_linking:
  format: "Resolves: KMFLOW-{id}"
  require_issue_ref: true
  keywords:
    - "Resolves"
    - "Closes"
    - "Fixes"

# Status workflow automation
status_workflows:
  enabled: true
  transitions:
    on_branch_create: "In Progress"
    on_pr_create: "In Review"
    on_pr_merge: "Done"

# VCS Provider
vcs_provider: "github"

# BDD Enforcement
bdd:
  enabled: true
  require_gherkin: true
  acceptance_criteria_heading: "## Acceptance Criteria"

# PM Tool Lock
_installation_locked: true
_installed_at: "2026-03-09T00:00:00Z"
_platform_version: "4.1.0"
